name: pgTAP DB Tests

# Corre los 16 archivos de supabase/tests/*.test.sql contra un Postgres local
# (Docker, vía Supabase CLI) con todas las migrations aplicadas desde cero.
#
# Contexto: estos tests existían hace semanas pero nunca corrían solos — se
# pegaban a mano vía el MCP de Supabase contra el proyecto remoto, siempre
# dentro de BEGIN...ROLLBACK (ver supabase/tests/README.md), porque el entorno
# de desarrollo no tiene Docker. Los runners de GitHub Actions sí lo tienen,
# así que acá corren de verdad con pg_prove, no pegados a mano.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  pgtap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version pineada (no "latest"): "latest" hace que la action resuelva la
      # release mas reciente contra la API de GitHub en cada corrida, y esa
      # llamada puede pegarle al mismo rate limit compartido de runners que ya
      # nos afecto en esta sesion ("Failed to resolve latest Supabase CLI
      # release: rate limit exceeded", exit 127, antes de llegar a correr nada).
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      # El log crudo de un step sólo se puede leer estando logueado en GitHub, así
      # que cada fallo del replay obligaba a que un humano copiara el error a mano.
      # Las *annotations*, en cambio, se leen por la API pública — así que si algo
      # falla republicamos la cola del log como annotation y queda visible sin login.
      - name: Levantar stack local de Supabase (Postgres + extensiones)
        run: |
          set +e
          out=$(supabase start 2>&1)
          code=$?
          printf '%s\n' "$out"
          if [ $code -ne 0 ]; then
            # Priorizar la linea ERROR: y la ultima migration aplicada — un CREATE TABLE
            # largo empuja el ERROR fuera de un tail plano.
            msg=$( { printf '%s\n' "$out" | grep -aiE "^(ERROR|FATAL)|SQLSTATE|Applying migration" | tail -8
                     echo "----- tail -----"
                     printf '%s\n' "$out" | tail -25
                   } | sed 's/%/%25/g; s/\r//g' | awk '{printf "%s%%0A", $0}')
            echo "::error title=supabase start fallo (replay de migrations)::${msg}"
          fi
          exit $code

      - name: Aplicar migrations y correr tests pgTAP
        run: |
          set +e
          out=$(supabase test db 2>&1)
          code=$?
          printf '%s\n' "$out"
          if [ $code -ne 0 ]; then
            # "Bad plan. You planned N tests but ran 0" no trae el motivo real — el
            # ERROR/FATAL que aborta ANTES del primer assert suele estar bien arriba
            # del resumen final de prove, así que priorizamos esas líneas.
            msg=$( { printf '%s\n' "$out" | grep -aiE "^(ERROR|FATAL|psql:)|SQLSTATE|not ok|# +Failed" | head -40
                     echo "----- tail -----"
                     printf '%s\n' "$out" | tail -40
                   } | sed 's/%/%25/g; s/\r//g' | awk '{printf "%s%%0A", $0}')
            echo "::error title=pgTAP fallo::${msg}"
          fi
          exit $code

      - name: Bajar el stack
        if: always()
        run: supabase stop
