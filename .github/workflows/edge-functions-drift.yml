name: Edge Functions Drift Check

# Compara el código de supabase/functions/ del repo contra lo que está REALMENTE
# desplegado en el proyecto hosted. Objetivo: detectar un deploy hecho a mano (o
# desde el dashboard) SIN commitear el mismo código al repo — el caso en que el
# repo "miente" sobre qué corre en producción (los 2 drifts reales que se
# encontraron a mano: probar-conexion-afip con una firma vieja de
# getLastVoucherNumber, y generar-csr con 2 implementaciones distintas).
#
# ── INFORMATIVO, NO BLOQUEA ──────────────────────────────────────────────────
# Un gate DURO no sirve acá, por dos razones, y daría rojo constantemente hasta
# entrenar a todos a ignorarlo:
#   1. Ruido de empaquetado: `supabase functions download` bundlea una copia de
#      _shared/ dentro de CADA función (congelada a su último deploy) y reescribe
#      los imports (../_shared → ./_shared). Un `git diff` crudo mezcla ese ruido
#      con drift real. (Fue justo lo que pasó la primera corrida real: el diff
#      salió gigante y casi todo era bundling + un deploy pendiente, no bugs.)
#   2. Flujo repo-first de KAIROX: se commitea el código y se despliega DESPUÉS,
#      tras aprobación (política repo-only del proyecto). Por eso es NORMAL y
#      esperado que el repo esté ADELANTE de lo desplegado en funciones con un
#      deploy pendiente (p. ej. hoy `arca-worker`, con la contingencia CAEA
#      commiteada pero a propósito sin desplegar).
#
# La señal de alarma REAL es la INVERSA: contenido DESPLEGADO que no está en el
# repo. En el diff de abajo (repo → desplegado) eso aparece como líneas `+`.
# Las líneas `-` son repo-adelante (deploy pendiente) o comentarios que el
# bundling saca — esperado, no es alarma. El diff se publica en el Job Summary
# para que un humano lo lea con ese criterio.
#
# Corre por `schedule` además de por `push`: el caso que ataca es un deploy hecho
# POR FUERA de un push a este repo, así que depender solo de push no lo agarraría.
#
# Requiere el secret SUPABASE_ACCESS_TOKEN — el token PERSONAL de la cuenta de
# Supabase (Dashboard → cuenta → Access Tokens), NO la anon key ni la
# service_role key. Sin ese secret, el job se salta solo con un warning.

on:
  push:
    branches: [master]
    paths:
      - 'supabase/functions/**'
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: {}

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Chequear que el secret esté configurado
        id: check-secret
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "::warning title=Edge Functions Drift Check::Falta el secret SUPABASE_ACCESS_TOKEN (ver comentario de cabecera de este workflow). Se salta el check."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: supabase/setup-cli@v1
        if: steps.check-secret.outputs.skip == 'false'
        with:
          version: 2.109.1

      - name: Descargar funciones desplegadas y comparar contra el repo
        if: steps.check-secret.outputs.skip == 'false'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Sin `set -e` a propósito: este job es INFORMATIVO y nunca debe fallar
          # (ver cabecera). Controlamos el flujo a mano.
          set -uo pipefail

          # --use-api evita depender de Docker (a diferencia de pgtap-tests.yml,
          # que sí necesita levantar el stack completo).
          if ! supabase functions download --project-ref wuznppxeonmhfcvnqfbf --use-api; then
            echo "::warning title=Edge Functions Drift Check::No se pudieron descargar las funciones desplegadas (¿token inválido o sin permiso?). Se omite la comparación."
            echo "⚠️ No se pudieron descargar las funciones desplegadas — no se pudo comparar esta corrida." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # `git add -A` para que el diff incluya también funciones DESPLEGADAS que
          # no existan en el repo (aparecerían como archivos nuevos = alarma real).
          git add -A -- supabase/functions

          if git diff --cached --quiet -- supabase/functions; then
            echo "✅ Sin drift: lo desplegado coincide con el repo." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "## ℹ️ Diferencias repo ↔ desplegado (informativo — no bloquea)"
            echo ""
            echo "**Cómo leer esto** (ver también la cabecera del workflow):"
            echo ""
            echo "- Diff en dirección **repo → desplegado**."
            echo "- Líneas \`-\` = está en el repo pero no en lo desplegado. Esperado:"
            echo "  deploy pendiente (repo-first) o comentarios que el bundling saca. **No es alarma.**"
            echo "- Líneas \`+\` = está DESPLEGADO pero no en el repo. **Esto sí hay que mirarlo:**"
            echo "  puede indicar un deploy hecho a mano sin commitear (o, más probable, ruido de"
            echo "  empaquetado como el import reescrito \`./_shared\` → revisar antes de asumir lo peor)."
            echo ""
            echo "Deploys pendientes conocidos hoy (repo adelante, esperado): \`arca-worker\` (contingencia CAEA sin desplegar)."
            echo ""
            echo '```diff'
            git diff --cached -- supabase/functions
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Edge Functions Drift Check::Hay diferencias repo↔desplegado — ver el Job Summary (informativo, no bloquea)."
          exit 0
